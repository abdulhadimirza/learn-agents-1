review_task:
  description: >
    Review the draft for grammar, tone, depth, and clarity. 
    Use the Character Counter Tool to find the exact character count and factor it into your review.
    
    {draft}
  expected_output: >
    A numeric score (1-10) and exactly 3-5 concise bullet points of actionable feedback (including character count). Keep feedback under 50 words. No pleasantries.
  agent: reviewer
